<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音樂節奏大挑戰</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        #start-screen, #game-screen, #result-screen { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 600px; }
        .hidden { display: none; }
        
        .mode-select { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .mode-btn { padding: 10px 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; }
        .mode-btn.active { border-color: #4a90e2; background: #eef5ff; font-weight: bold; }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee; font-size: 18px; font-weight: bold; }
        .hint-text { color: #e74c3c; font-weight: bold; margin: 10px 0; background: #fff5f5; padding: 10px; border-radius: 8px; }

        .question-area { background: #fafafa; border: 2px dashed #bbb; padding: 20px; margin: 20px 0; border-radius: 10px; min-height: 100px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; }
        .note-img { height: 80px; width: auto; }

        .input-display { border-bottom: 4px solid #4a90e2; min-height: 80px; margin: 20px 0; display: flex; justify-content: center; align-items: center; gap: 10px; background: #f0f7ff; border-radius: 10px; }
        .rest-icon-small { height: 60px; width: auto; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .rest-btn { background: white; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; padding: 10px; width: 100px; }
        .rest-btn img { width: 100%; height: 60px; object-fit: contain; }
        
        .action-btn { padding: 12px 30px; font-size: 18px; cursor: pointer; border-radius: 50px; border: none; background: #4a90e2; color: white; font-weight: bold; }
        .clear-btn { background: #999; }

        .final-info { text-align: left; display: inline-block; line-height: 2; font-size: 20px; margin: 20px 0; }
        .highlight { color: #4a90e2; font-weight: bold; }
        #res-title { font-size: 28px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #4a90e2;">🎼 音樂節奏大挑戰</h1>
        <input type="text" id="user-info" placeholder="輸入班級座號 (如：30101)" style="padding: 12px; width: 80%; font-size: 18px; margin-bottom: 10px;">
        
        <div class="mode-select">
            <button class="mode-btn" onclick="setMode('easy', this)">簡單<br>(10題計時)</button>
            <button class="mode-btn" onclick="setMode('medium', this)">中等<br>(3命30題)</button>
            <button class="mode-btn" onclick="setMode('hard', this)">困難<br>(3分不准錯)</button>
        </div>
        
        <button class="action-btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="info-bar">
            <div>模式: <span id="display-mode">--</span></div>
            <div id="correct-counter" style="color: #27ae60;">答對: 0 題</div>
            <div>時間: <span id="timer">0</span></div>
        </div>
        <div id="extra-info" style="font-size: 16px; margin-bottom: 10px; color: #666;">進度: --</div>
        
        <div id="hint-area" class="hint-text hidden"></div>
        
        <div class="question-area" id="question-box"></div>

        <div class="input-display" id="input-box"></div>

        <div class="btn-group">
            <button class="rest-btn" onclick="addRest(4, 'whole_rest.png')"><img src="whole_rest.png"></button>
            <button class="rest-btn" onclick="addRest(2, 'half_rest.png')"><img src="half_rest.png"></button>
            <button class="rest-btn" onclick="addRest(1, 'quarter_rest.png')"><img src="quarter_rest.png"></button>
        </div>

        <div class="btn-group">
            <button class="action-btn clear-btn" onclick="clearInput()">重填</button>
            <button class="action-btn" onclick="submitAnswer()">提交答案</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div id="res-title"></div>
        <div class="final-info">
            難度模式：<span id="res-mode" class="highlight"></span><br>
            班級座號：<span id="res-user" class="highlight"></span><br>
            正確題數：<span id="res-correct" class="highlight"></span><br>
            錯誤次數：<span id="res-wrong" class="highlight"></span><br>
            花費時間：<span id="res-time" class="highlight"></span>
        </div>
        <p>請截圖此畫面交給老師</p>
        <button class="action-btn" onclick="location.reload()">重新開始</button>
    </div>

    <script>
        const notesData = [
            { id: "w", beats: 4, img: "whole_note.png" },
            { id: "dh", beats: 3, img: "dot_half_note.png" },
            { id: "h", beats: 2, img: "half_note.png" },
            { id: "q", beats: 1, img: "quarter_note.png" },
            { id: "2e", beats: 1, img: "pair_eighth_note.png" },
            { id: "ld", beats: 2, img: "long_dotted.png" },
            { id: "sd", beats: 1, img: "short_dotted.png" }
        ];

        let gameMode = ''; 
        let currentLevel = 0;
        let totalBeats = 0;
        let userBeats = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let lives = 3;
        let lastQuestionKey = "";
        let timerSeconds = 0;
        let timerInterval;
        let userInputImages = [];
        let questionBeatsArray = [];
        let isFailed = false;

        function setMode(mode, btn) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startGame() {
            const info = document.getElementById('user-info').value;
            if(!info || !gameMode) { alert("請輸入座號並選擇難度！"); return; }
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            initTimer();
            generateLevel();
        }

        function initTimer() {
            const timerDisp = document.getElementById('timer');
            const modeDisp = document.getElementById('display-mode');
            const extraDisp = document.getElementById('extra-info');

            if(gameMode === 'easy') {
                modeDisp.innerText = "簡單";
                timerSeconds = 0;
                timerInterval = setInterval(() => { timerSeconds++; timerDisp.innerText = timerSeconds + "秒"; }, 1000);
            } else if(gameMode === 'medium') {
                modeDisp.innerText = "中等";
                extraDisp.innerText = "剩餘生命: ❤️❤️❤️ | 進度: 0/30";
                timerInterval = setInterval(() => { timerSeconds++; timerDisp.innerText = timerSeconds + "秒"; }, 1000);
            } else if(gameMode === 'hard') {
                modeDisp.innerText = "困難";
                timerSeconds = 180; 
                extraDisp.innerText = "挑戰倒計時，請勿答錯！";
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    let min = Math.floor(timerSeconds / 60);
                    let sec = timerSeconds % 60;
                    timerDisp.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                    if(timerSeconds <= 0) {
                        isFailed = false; // 成功撐過 3 分鐘
                        endGame();
                    }
                }, 1000);
            }
        }

        function generateLevel() {
            document.getElementById('hint-area').classList.add('hidden');
            document.getElementById('correct-counter').innerText = `答對: ${correctCount} 題`;
            clearInput();
            
            const questionBox = document.getElementById('question-box');
            let currentBeats = 0;
            let currentIds = [];
            
            let attempts = 0;
            do {
                currentBeats = 0;
                currentIds = [];
                questionBeatsArray = [];
                let limit = 4;
                while (limit > 0) {
                    const available = notesData.filter(n => n.beats <= limit);
                    if (available.length === 0) break;
                    const pick = available[Math.floor(Math.random() * available.length)];
                    currentBeats += pick.beats;
                    currentIds.push(pick.id);
                    questionBeatsArray.push(pick.beats);
                    limit -= pick.beats;
                    if (Math.random() > 0.7) break;
                }
                attempts++;
            } while (currentIds.join('-') === lastQuestionKey && attempts < 10);

            lastQuestionKey = currentIds.join('-');
            totalBeats = currentBeats;

            questionBox.innerHTML = "";
            currentIds.forEach(id => {
                const note = notesData.find(n => n.id === id);
                const img = document.createElement('img');
                img.src = note.img;
                img.className = "note-img";
                questionBox.appendChild(img);
            });

            if(gameMode === 'easy') {
                document.getElementById('extra-info').innerText = `進度: ${currentLevel + 1}/10`;
            } else if(gameMode === 'medium') {
                document.getElementById('extra-info').innerText = `剩餘生命: ${"❤️".repeat(lives)} | 進度: ${currentLevel + 1}/30`;
            }
        }

        function addRest(beats, src) {
            userBeats += beats;
            userInputImages.push(src);
            updateDisplay();
        }

        function clearInput() {
            userBeats = 0;
            userInputImages = [];
            document.getElementById('input-box').innerHTML = "";
        }

        function updateDisplay() {
            const box = document.getElementById('input-box');
            box.innerHTML = "";
            userInputImages.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "rest-icon-small";
                box.appendChild(img);
            });
        }

        function submitAnswer() {
            if (userBeats === totalBeats) {
                alert("✅ 回答正確！");
                correctCount++;
                currentLevel++;
                
                if(gameMode === 'easy' && currentLevel >= 10) {
                    isFailed = false;
                    endGame();
                } else if(gameMode === 'medium' && currentLevel >= 30) {
                    isFailed = false;
                    endGame();
                } else {
                    generateLevel();
                }
            } else {
                wrongCount++;
                if(gameMode === 'medium') {
                    lives--;
                    if(lives <= 0) { 
                        alert("❌ 生命值用完囉！挑戰結束。"); 
                        isFailed = true;
                        endGame(); 
                        return; 
                    }
                    document.getElementById('extra-info').innerText = `剩餘生命: ${"❤️".repeat(lives)} | 進度: ${currentLevel + 1}/30`;
                } else if(gameMode === 'hard') {
                    alert("❌ 困難模式不准答錯！挑戰失敗。"); 
                    isFailed = true;
                    endGame(); 
                    return;
                }
                
                showHint();
                alert("❌ 拍數不對，再試一次！");
                clearInput();
            }
        }

        function showHint() {
            const hintArea = document.getElementById('hint-area');
            hintArea.classList.remove('hidden');
            hintArea.innerHTML = `提示：題目是 ${questionBeatsArray.join(" + ")} = ${totalBeats} 拍<br>(全休止=4, 二分=2, 四分=1)`;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const titleEl = document.getElementById('res-title');
            if (isFailed) {
                titleEl.innerText = "❌ 挑戰失敗";
                titleEl.style.color = "#e74c3c";
            } else {
                titleEl.innerText = "🎉 挑戰成功";
                titleEl.style.color = "#27ae60";
            }

            document.getElementById('res-mode').innerText = 
                gameMode === 'easy' ? "簡單 (10題計時)" : (gameMode === 'medium' ? "中等 (3命30題)" : "困難 (3分挑戰)");
            document.getElementById('res-user').innerText = document.getElementById('user-info').value;
            document.getElementById('res-correct').innerText = correctCount + " 題";
            document.getElementById('res-wrong').innerText = wrongCount + " 次";
            
            let timeTaken = 0;
            if(gameMode === 'hard') {
                timeTaken = 180 - timerSeconds;
            } else {
                timeTaken = timerSeconds;
            }
            document.getElementById('res-time').innerText = Math.floor(timeTaken/60) + "分" + (timeTaken%60) + "秒";
        }
    </script>
</body>
</html>
